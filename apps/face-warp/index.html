<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DEMON Face Warp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="hud top">
        <div class="brand">
          <span id="signal" class="signal"></span>
          <div>
            <h1>DEMON Face Warp</h1>
            <p id="status">Loading three-mediapipe-rig canonical face...</p>
          </div>
        </div>
        <div class="transport">
          <button id="startBtn" type="button">Start DEMON</button>
          <button id="webcamBtn" type="button">Retry Webcam</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
        </div>
      </section>

      <section class="hud controls">
        <div class="panel-title">
          <span>Package Face Controls</span>
          <output id="energyReadout">0.00</output>
        </div>
        <div class="xy-pad" id="xyPad">
          <span class="axis horizontal"></span>
          <span class="axis vertical"></span>
          <span class="puck" id="puck"></span>
        </div>
        <div class="grid react">
          <label>Strength <input id="reactStrength" type="range" min="0" max="1" step="0.01" value="0.6" /></label>
          <label>Division
            <select id="reactDivision">
              <option value="1">Quarter</option>
              <option value="2">Half</option>
              <option value="4" selected>Bar</option>
              <option value="8">2 bar</option>
            </select>
          </label>
          <label>Method
            <select id="reactMethod">
              <option value="random">Random</option>
              <option value="circular" selected>Circular</option>
              <option value="sin">Sine</option>
            </select>
          </label>
          <label>Mode
            <select id="reactMode">
              <option value="continuous" selected>Continuous</option>
              <option value="discrete">Discrete</option>
            </select>
          </label>
        </div>
        <div class="grid">
          <label>eyeDistance <input id="eyeDistance" type="range" min="-2.25" max="2.25" step="0.001" value="0" /></label>
          <label>jawLine <input id="jawLine" type="range" min="-2.25" max="2.25" step="0.001" value="0" /></label>
          <label>UV factor <input id="uvFactor" type="range" min="0" max="1" step="0.001" value="0" /></label>
          <label>Roughness <input id="roughness" type="range" min="0" max="1" step="0.001" value="0.8" /></label>
          <label>Metalness <input id="metalness" type="range" min="0" max="1" step="0.001" value="0" /></label>
          <label>Clearcoat <input id="clearcoat" type="range" min="0" max="1" step="0.001" value="0" /></label>
        </div>
      </section>

      <section class="hud engine">
        <div class="panel-title">
          <span>DEMON</span>
          <output id="engineReadout">idle</output>
        </div>
        <label>Track <select id="fixtureSelect"></select></label>
        <label>Prompt A <textarea id="promptA" rows="3">rubbery mutant funk, elastic bass, comic vocal chops, glossy club drums</textarea></label>
        <label>Prompt B <textarea id="promptB" rows="3">haunted hyperpop carnival, warped face filter energy, syncopated synth stabs</textarea></label>
        <div class="grid">
          <label>Prompt blend <input id="promptBlend" type="range" min="0" max="1" step="0.01" value="0.25" /></label>
          <label>LoRA <select id="loraSelect"></select></label>
        </div>
        <div class="knob-sliders">
          <label>
            <span>LoRA strength <output id="loraStrengthValue">0.50</output></span>
            <input id="loraStrength" type="range" min="0" max="2" step="0.01" value="0.5" />
          </label>
          <label>
            <span>Denoise <output id="denoiseValue">--</output></span>
            <input id="denoiseKnob" type="range" min="0" max="1" step="0.01" value="0" disabled />
          </label>
          <label>
            <span>Structure <output id="structureValue">--</output></span>
            <input id="structureKnob" type="range" min="0" max="1" step="0.01" value="0" disabled />
          </label>
          <label>
            <span>Timbre <output id="timbreValue">--</output></span>
            <input id="timbreKnob" type="range" min="0" max="1" step="0.01" value="0" disabled />
          </label>
        </div>
      </section>

      <section class="meters">
        <span id="bassMeter"></span>
        <span id="midMeter"></span>
        <span id="sparkMeter"></span>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.183.1",
          "three/": "https://esm.sh/three@0.183.1/",
          "three/webgpu": "https://esm.sh/three@0.183.1/webgpu",
          "three/tsl": "https://esm.sh/three@0.183.1/tsl",
          "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision@0.10.32",
          "fflate": "https://esm.sh/fflate@0.8.2"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
